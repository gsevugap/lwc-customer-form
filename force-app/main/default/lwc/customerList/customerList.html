<template>
    <lightning-card title="Customers" icon-name="standard:contact">
        <div slot="actions">
            <lightning-button
                variant="brand"
                label="New Customer"
                icon-name="utility:add"
                onclick={handleNewCustomer}
            ></lightning-button>
        </div>
        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>
            <template if:false={isLoading}>
                <template if:true={hasContacts}>
                    <lightning-datatable
                        key-field="id"
                        data={contacts}
                        columns={columns}
                        hide-checkbox-column
                        onrowaction={handleRowAction}
                    ></lightning-datatable>
                </template>
                <template if:false={hasContacts}>
                    <div class="slds-illustration slds-illustration_small slds-p-around_medium">
                        <p class="slds-text-body_regular slds-text-color_weak">No customers found. Click <strong>New Customer</strong> to get started.</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
