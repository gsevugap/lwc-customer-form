<template>
    <lightning-card title="New Customer" icon-name="standard:contact">
        <div class="slds-p-around_medium">
            <template if:true={successMessage}>
                <div class="slds-notify slds-notify_toast slds-theme_success slds-m-bottom_medium" role="status">
                    <span class="slds-assistive-text">success</span>
                    <p>{successMessage}</p>
                </div>
            </template>
            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_toast slds-theme_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <p>{errorMessage}</p>
                </div>
            </template>

            <lightning-input
                label="First Name"
                name="firstName"
                value={firstName}
                onchange={handleChange}
                required
            ></lightning-input>

            <lightning-input
                label="Last Name"
                name="lastName"
                value={lastName}
                onchange={handleChange}
                class="slds-m-top_small"
                required
            ></lightning-input>

            <lightning-input
                label="Email"
                name="email"
                type="email"
                value={email}
                onchange={handleChange}
                class="slds-m-top_small"
            ></lightning-input>

            <lightning-input
                label="Phone"
                name="phone"
                type="tel"
                value={phone}
                onchange={handleChange}
                class="slds-m-top_small"
            ></lightning-input>

            <div class="slds-section slds-m-top_medium">
                <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                    Shipping Address
                </h3>
            </div>

            <lightning-input
                label="Street"
                name="shippingStreet"
                value={shippingStreet}
                onchange={handleChange}
                class="slds-m-top_small"
            ></lightning-input>

            <lightning-input
                label="City"
                name="shippingCity"
                value={shippingCity}
                onchange={handleChange}
                class="slds-m-top_small"
            ></lightning-input>

            <div class="slds-grid slds-gutters slds-m-top_small">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input
                        label="State"
                        name="shippingState"
                        value={shippingState}
                        onchange={handleChange}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input
                        label="Zip Code"
                        name="shippingPostalCode"
                        value={shippingPostalCode}
                        onchange={handleChange}
                    ></lightning-input>
                </div>
            </div>

            <lightning-input
                label="Country"
                name="shippingCountry"
                value={shippingCountry}
                onchange={handleChange}
                class="slds-m-top_small"
            ></lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label="Save"
                    onclick={handleSave}
                    disabled={isSaving}
                ></lightning-button>
                <lightning-button
                    variant="neutral"
                    label="Reset"
                    onclick={handleReset}
                    disabled={isSaving}
                    class="slds-m-left_small"
                ></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
