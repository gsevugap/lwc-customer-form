<template>
    <lightning-card title="New Customer" icon-name="standard:contact">
        <div class="slds-p-around_medium">
            <template if:true={successMessage}>
                <div class="slds-notify slds-notify_toast slds-theme_success slds-m-bottom_medium" role="status">
                    <span class="slds-assistive-text">success</span>
                    <p>{successMessage}</p>
                </div>
            </template>
            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_toast slds-theme_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <p>{errorMessage}</p>
                </div>
            </template>

            <lightning-input
                label="First Name"
                name="firstName"
                value={firstName}
                onchange={handleChange}
                required
            ></lightning-input>

            <lightning-input
                label="Last Name"
                name="lastName"
                value={lastName}
                onchange={handleChange}
                class="slds-m-top_small"
                required
            ></lightning-input>

            <lightning-input
                label="Email"
                name="email"
                type="email"
                value={email}
                onchange={handleChange}
                class="slds-m-top_small"
            ></lightning-input>

            <lightning-input
                label="Phone"
                name="phone"
                type="tel"
                value={phone}
                onchange={handleChange}
                class="slds-m-top_small"
            ></lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label="Save"
                    onclick={handleSave}
                    disabled={isSaving}
                ></lightning-button>
                <lightning-button
                    variant="neutral"
                    label="Reset"
                    onclick={handleReset}
                    disabled={isSaving}
                    class="slds-m-left_small"
                ></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
